<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Yuli – Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --burg: #6B2737;
      --terra: #C4622D;
      --cream: #FAF7F2;
      --dark: #3D1A1F;
      --muted: #9E7B85;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background tropical texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(107,39,55,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(196,98,45,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Decorative top stripe */
    .top-stripe {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--burg), var(--terra), var(--burg));
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 36px 44px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 
        0 4px 6px rgba(61,26,31,0.04),
        0 20px 60px rgba(61,26,31,0.10);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .logo-wrap img {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }

    .welcome-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 12px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 8px;
      animation: fadeUp 0.6s ease 0.25s both;
    }

    .subheadline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 10px;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--burg), var(--terra));
      margin: 20px auto 24px;
      border-radius: 2px;
      animation: fadeUp 0.6s ease 0.35s both;
    }

    .message {
      font-size: 14px;
      line-height: 1.7;
      color: #6B5560;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    .buttons {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.6s ease 0.45s both;
    }

    .btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 18px 12px;
      border-radius: 14px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-en {
      background: var(--burg);
      color: #fff;
      box-shadow: 0 4px 20px rgba(107,39,55,0.3);
    }

    .btn-en:hover {
      box-shadow: 0 6px 28px rgba(107,39,55,0.4);
      transform: translateY(-2px);
    }

    .btn-es {
      background: var(--cream);
      border: 2px solid var(--burg);
      color: var(--burg);
    }

    .btn-es:hover {
      background: rgba(107,39,55,0.06);
      transform: translateY(-2px);
    }

    .btn-flag {
      font-size: 22px;
      line-height: 1;
    }

    .btn-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .btn-sublabel {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
      animation: fadeUp 0.6s ease 0.55s both;
    }

    .footer a {
      color: var(--terra);
      text-decoration: none;
    }

    .wifi-note {
      margin-top: 16px;
      font-size: 11px;
      color: #bbb;
      animation: fadeUp 0.6s ease 0.6s both;
    }

    .wifi-note span {
      display: inline-block;
      background: #f5f0ec;
      border-radius: 6px;
      padding: 4px 10px;
      font-family: monospace;
      color: var(--dark);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
